name: karakter_app
description: Karakter generator med hjul, klasse-overblik og klage-håndtering.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management — simple and beginner-friendly
  provider: ^6.1.2

  # Unique IDs for models
  uuid: ^4.4.0

  # Spinning wheel of fortune animation
  flutter_fortune_wheel: ^1.3.1

  # Nice icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true