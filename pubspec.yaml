name: karakter_app
description: Karakter generator med hjul, klasse-overblik og klage-håndtering.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  provider: ^6.1.2
  uuid: ^4.4.0
  flutter_fortune_wheel: ^1.3.1
  fl_chart: ^0.68.0
  shared_preferences: ^2.3.2
  shake: ^2.2.0
  cupertino_icons: ^1.0.6

# The shake package depends on sensors_plus 1.4.1 which lacks a namespace
# declaration required by AGP 8+. This forces a newer compatible version.
dependency_overrides:
  sensors_plus: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true